version: "3.8"

services:
  itu-minitwit:
    image: ${DOCKER_USERNAME}/itu-minitwit:${TAG:-latest}
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_URLS=${ASPNETCORE_URLS}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - ConnectionStrings__Redis=${ConnectionStrings__Redis}
    networks:
      - itu-minitwit-network
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.role == app
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - itu-minitwit-network
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7
    networks:
      - itu-minitwit-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == redis
      restart_policy:
        condition: on-failure

networks:
  itu-minitwit-network:
    driver: overlay
