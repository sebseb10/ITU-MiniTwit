version: "3.8"

services:
  itu-minitwit:
    image: ${DOCKER_USERNAME}/itu-minitwit:${TAG:-latest}
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_URLS=${ASPNETCORE_URLS}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
    secrets:
      - db_connection
      - redis_connection
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - apparmor:docker-default
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - itu-minitwit-network
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.role == app
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 5s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - apparmor:docker-default
    ulimits:
      nofile:
        soft: 1024
        hard: 1024
    networks:
      - itu-minitwit-network
    deploy:
      mode: global
      resources:
        limits:
          memory: 128m
          cpus: '0.1'
      restart_policy:
        condition: on-failure

  redis:
    image: redis:7
    volumes:
      - redis-data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
      - apparmor:docker-default
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - itu-minitwit-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == redis
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
      restart_policy:
        condition: on-failure

volumes:
  redis-data:
    driver: local

secrets:
  db_connection:
    external: true
  redis_connection:
    external: true

networks:
  itu-minitwit-network:
    driver: overlay
