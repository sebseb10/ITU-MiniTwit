name: CD #Build and deploy ASP.Net Core app to Azure Web App - bdsa2025group6chirp

on:
  workflow_run:
    workflows: ["CI -- Build, Test, and Release"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/itu-minitwit:latest
            ${{ secrets.DOCKER_USERNAME }}/itu-minitwit:${{ github.sha }}
  
  scan:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: trivy — image vulnerability and secret scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/itu-minitwit:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          scanners: vuln,secret

  Deploy:
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_APP2 }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Bootstrap swarm manager
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST_APP2 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY_APP2 }}
          script: |
            mkdir -p /opt/itu-minitwit

      - name: Configure Docker daemon log level
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST_APP2 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY_APP2 }}
          script: |
            if [ ! -f /etc/docker/daemon.json ]; then
              cp /opt/itu-minitwit/infra/daemon.json /etc/docker/daemon.json
              kill -HUP $(pidof dockerd) 2>/dev/null || true
            fi

      - name: Create Docker secrets
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST_APP2 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY_APP2 }}
          script: |
            if ! docker secret inspect db_connection >/dev/null 2>&1; then
              printf '%s' '${{ secrets.DO_CONNECTION_STRING }}' | docker secret create db_connection -
            fi
            if ! docker secret inspect redis_connection >/dev/null 2>&1; then
              printf '%s' '${{ secrets.DO_REDIS_CONNECTION_STRING }}' | docker secret create redis_connection -
            fi

      - name: Sync files to swarm manager
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'bin' \
            --exclude 'obj' \
            --exclude 'data' \
            --exclude '.env' \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST_APP2 }}:/opt/itu-minitwit/

      - name: Write production .env on swarm manager
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST_APP2 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY_APP2 }}
          script: |
            cat > /opt/itu-minitwit/.env <<'EOF'
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            TAG=${{ github.sha }}
            ASPNETCORE_ENVIRONMENT=Production
            ASPNETCORE_URLS=http://+:5001
            EOF

      - name: Deploy minitwit stack
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST_APP2 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY_APP2 }}
          script: |
            cd /opt/itu-minitwit
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            set -a; source .env; set +a
            docker stack deploy -c docker-stack.yml minitwit --with-registry-auth
            docker image prune -f || true

      - name: Health check
        run: |
          curl --retry 10 --retry-delay 5 --retry-connrefused https://itu-minitwit.duckdns.org

  Deploy-Monitoring:
    runs-on: ubuntu-latest
    needs: Deploy
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_APP2 }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy monitoring stack
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST_APP2 }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY_APP2 }}
          script: |
            cd /opt/itu-minitwit
            docker stack rm monitorbare 2>/dev/null || true
            docker stack rm monitoring 2>/dev/null || true
            timeout 120 sh -c 'until [ -z "$(docker service ls --filter label=com.docker.stack.namespace=monitoring -q 2>/dev/null)" ]; do sleep 5; done'
            docker stack deploy -c docker-stack.monitoring.yml monitoring
